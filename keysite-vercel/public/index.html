<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Key System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #58a6ff;
      --accent2: #a855f7;
      --glow: rgba(88,166,255,0.25);
      --success: #2fb777;
      --error: #f85149;
      --text: #e6edf3;
      --muted: #8b949e;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Fond grille */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(48,54,61,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(48,54,61,0.5) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
    }

    /* Glow central */
    body::after {
      content: '';
      position: fixed;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(88,166,255,0.07) 0%, transparent 65%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown .5s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 16px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 18px;
    }

    .dot {
      width: 7px; height: 7px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
      animation: blink 2s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .header h1 {
      font-size: 46px;
      font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
    }

    .header p {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeUp .5s ease .1s both;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    /* Steps bar */
    .steps {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0;
    }

    .step {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      border-right: 1px solid var(--border);
      transition: all .3s;
    }
    .step:last-child { border-right: none; }

    .step.active { color: var(--accent); }
    .step.done { color: var(--success); }

    .step-n {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .step.done .step-n { background: var(--success); border-color: var(--success); color: #fff; }
    .step.active .step-n { background: rgba(88,166,255,.15); box-shadow: 0 0 12px var(--glow); }

    /* Card body */
    .card-body { padding: 28px; }

    /* Info box */
    .info {
      background: rgba(88,166,255,.07);
      border: 1px solid rgba(88,166,255,.2);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 22px;
    }
    .info b { color: var(--accent); }

    /* Existing key box */
    .key-box {
      background: rgba(47,183,119,.07);
      border: 1px solid rgba(47,183,119,.25);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 18px;
      display: none;
    }
    .key-box-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--success);
      margin-bottom: 8px;
    }
    .key-value {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 3px;
      word-break: break-all;
      margin-bottom: 6px;
    }
    .key-expiry {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* Bouton principal */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #3b82f6);
      color: #fff;
      box-shadow: 0 4px 20px rgba(88,166,255,.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(88,166,255,.4); }
    .btn-primary:active { transform: translateY(0); }

    .btn-green {
      background: rgba(47,183,119,.1);
      border: 1px solid rgba(47,183,119,.3);
      color: var(--success);
      margin-top: 10px;
    }
    .btn-green:hover { background: rgba(47,183,119,.2); }

    /* Loading */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 20px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      animation: fadeUp .5s ease .2s both;
    }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:translateY(0)} }

    /* Particules */
    .particles { position:fixed; inset:0; pointer-events:none; z-index:0; }
    .p {
      position:absolute;
      border-radius:50%;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      from { transform: translateY(100vh); opacity: .6; }
      to   { transform: translateY(-60px); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="particles" id="pts"></div>

<div class="wrap">
  <div class="header">
    <div class="badge"><div class="dot"></div>KEY SYSTEM</div>
    <h1 id="siteName">MonScript</h1>
    <p>Obtiens ta clé d'accès gratuite · Valide 24h</p>
  </div>

  <div class="card">
    <div class="steps">
      <div class="step done" id="s1">
        <div class="step-n">✓</div>Arrivée
      </div>
      <div class="step active" id="s2">
        <div class="step-n">2</div>Linkvertise
      </div>
      <div class="step" id="s3">
        <div class="step-n">3</div>Ta Key
      </div>
    </div>

    <div class="card-body">
      <!-- Key existante (cachée par défaut) -->
      <div class="key-box" id="keyBox">
        <div class="key-box-label">✦ KEY ACTIVE</div>
        <div class="key-value" id="keyVal">—</div>
        <div class="key-expiry" id="keyExp"></div>
      </div>

      <!-- Info -->
      <div class="info" id="infoBox">
        Clique sur le bouton → complète la page Linkvertise (10 sec) → reviens avec ta key valide <b>24 heures</b>.
      </div>

      <!-- Bouton Linkvertise -->
      <a href="#" class="btn btn-primary" id="mainBtn" onclick="handleClick(event)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Obtenir ma Key — Étape 1/1
      </a>

      <!-- Bouton copier (caché par défaut) -->
      <button class="btn btn-green" id="copyBtn" style="display:none" onclick="copyKey()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/></svg>
        Copier la key
      </button>
    </div>
  </div>

  <div class="footer">
    Gratuit · Keys 24h · Propulsé par ton site
  </div>
</div>

<script>
  let currentKey = null;

  // Particules
  const pts = document.getElementById('pts');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    const size = Math.random() * 3 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}vw;
      background:${['#58a6ff','#a855f7','rgba(255,255,255,.4)'][Math.floor(Math.random()*3)]};
      animation-duration:${8+Math.random()*8}s;
      animation-delay:${Math.random()*8}s;
      opacity:.5;
    `;
    pts.appendChild(p);
  }

  // Au chargement : vérifie si l'IP a déjà une key
  async function init() {
    try {
      const res = await fetch('/api/getlink');
      const data = await res.json();

      if (data.hasKey) {
        showExistingKey(data.key, data.expires_at);
      } else {
        // Stocke l'URL Linkvertise pour le bouton
        document.getElementById('mainBtn').href = data.linkvertiseUrl;
      }
    } catch(e) {
      console.error(e);
    }
  }

  function showExistingKey(key, expiresAt) {
    currentKey = key;
    document.getElementById('keyVal').textContent = key;
    const exp = new Date(expiresAt);
    document.getElementById('keyExp').textContent = `Expire le ${exp.toLocaleDateString('fr-FR')} à ${exp.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'})}`;
    document.getElementById('keyBox').style.display = 'block';
    document.getElementById('infoBox').style.display = 'none';
    document.getElementById('mainBtn').style.display = 'none';
    document.getElementById('copyBtn').style.display = 'flex';
    document.getElementById('s2').className = 'step done';
    document.getElementById('s2').innerHTML = '<div class="step-n">✓</div>Linkvertise';
    document.getElementById('s3').className = 'step done';
    document.getElementById('s3').innerHTML = '<div class="step-n">✓</div>Ta Key';
  }

  function handleClick(e) {
    const btn = document.getElementById('mainBtn');
    if (!btn.href || btn.href === '#' || btn.href === window.location.href + '#') {
      e.preventDefault();
      init().then(() => {
        const href = document.getElementById('mainBtn').href;
        if (href && href !== '#') window.open(href, '_blank');
      });
    }
  }

  function copyKey() {
    if (!currentKey) return;
    navigator.clipboard.writeText(currentKey).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Copié !`;
      setTimeout(() => {
        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/></svg> Copier la key`;
      }, 2500);
    });
  }

  init();
</script>
</body>
</html>
